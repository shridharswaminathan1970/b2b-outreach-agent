# Pure static SPA server. On Railway the api is a SEPARATE service and the SPA
# calls it directly via VITE_API_URL (baked into the bundle), so the web service
# does NOT proxy /api — that avoids depending on Railway's private-network DNS
# (the old api/outreachapi.railway.internal upstream was the source of 502s).
# Email tracking (/t) + the Resend webhook (/webhooks) are hit on the api's own
# public URL (PUBLIC_TRACKING_URL), not through here.
#
# Processed as an nginx template (/etc/nginx/templates/*.template) so ${PORT} is
# substituted at container start via the nginx image's envsubst (Railway $PORT).
server {
    # Listen on BOTH IPv4 and IPv6. Railway's edge connects to the container over
    # IPv6, so the IPv6 listener is required or the platform returns 502 (the
    # nginx image's 10-listen-on-ipv6 script runs before envsubst and so doesn't
    # touch this templated config). ${PORT} is the Railway-assigned port.
    listen ${PORT};
    listen [::]:${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: every path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
