# SPA static serving + reverse proxy to the API. Processed as an nginx template
# (/etc/nginx/templates/*.template) so ${PORT} is substituted at container start
# via the nginx image's built-in envsubst — Railway assigns a dynamic $PORT.
server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the API service. Upstream is the Railway private-network
    # hostname (outreachapi.railway.internal:3001); resolved at nginx startup. The
    # full /api prefix is preserved because proxy_pass has no path component.
    # NOTE: for local docker-compose this host won't resolve — override the image
    # or point the SPA at the api directly via VITE_API_URL.
    location /api/ {
        proxy_pass http://outreachapi.railway.internal:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public email-tracking ingress (open pixel + unsubscribe) and the inbound
    # Resend webhook live at the API root, not under /api — proxy them too so
    # mail clients / Resend can reach them when web is the only public entry.
    location /t/ {
        proxy_pass http://outreachapi.railway.internal:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /webhooks/ {
        proxy_pass http://outreachapi.railway.internal:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache hashed assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: every other path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
