# Local/dev orchestration. The database is Supabase (external) and the job queue
# runs on that same Postgres via pg-boss — so there is NO local postgres or redis
# service. The three app services read DATABASE_URL / DIRECT_URL + secrets from
# the root .env (env_file). Bring up with: docker compose up --build
#
# Run migrations once against Supabase before first boot: ./scripts/db-migrate.sh

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
